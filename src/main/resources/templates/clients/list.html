<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Clients</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#0d1b3d;
            color:white;
            padding-top:20px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1b2c59;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .btn-custom{
            background:#0d1b3d;
            color:white;
        }

        .btn-custom:hover{
            background:#1b2c59;
            color:white;
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>
        <i class="bi bi-shield-check"></i>
        Management System
    </h3>

    <a th:href="@{/clients}">
        <i class="bi bi-people"></i>
        Clients
    </a>

    <a th:href="@{/insurances}">
        <i class="bi bi-shield"></i>
        Insurances
    </a>

    <a th:href="@{/policies}">
        <i class="bi bi-file-earmark-text"></i>
        Policies
    </a>

    <a th:href="@{/payments}">
        <i class="bi bi-cash"></i>
        Payments
    </a>

    <a th:href="@{/logout}">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            <i class="bi bi-people-fill"></i>
            Clients List
        </h2>
        
        
        <div>

            <!-- Botón dashboard -->
            <a th:href="@{/dashboard}"
               class="btn btn-outline-secondary me-2">

                <i class="bi bi-house-door"></i>
                Dashboard

            </a>

            <!-- Solo ADMIN y EMPLOYEE pueden crear -->
            <a sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_EMPLOYEE')"
               th:href="@{/clients/new}"
               class="btn btn-custom">

                <i class="bi bi-plus-circle"></i>
                New Client

            </a>

        </div>

    </div>
    
    
    <form th:action="@{/clients}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search client by name..."
                   th:value="${search}">
            <button class="btn btn-outline-secondary" type="submit">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </form>

    <div class="card card-custom p-4">

        <table class="table table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th sec:authorize="
                        hasAnyAuthority(
                            'ROLE_ADMIN',
                            'ROLE_EMPLOYEE'
                        )"> 
                        
                        Actions
                    </th>    
                </tr>
            </thead>

            <tbody>

                <tr th:each="c : ${clients}">

                    <td th:text="${c.name}"></td>

                    <td th:text="${c.email}"></td>

                    <td th:text="${c.phone}"></td>

                    <td>

                        <!-- Editar -->
                        <a sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_EMPLOYEE')"
                           th:href="@{/clients/edit/{id}(id=${c.id})}"
                           class="btn btn-warning btn-sm">

                            <i class="bi bi-pencil"></i>

                        </a>

                        <!-- Eliminar SOLO ADMIN -->
                        <a sec:authorize="hasAuthority('ROLE_ADMIN')"
                           th:href="@{/clients/delete/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm">

                            <i class="bi bi-trash"></i>

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
