<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .container-form {
            max-width: 800px;
            margin: auto;
            margin-top: 50px;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-custom {
            background: #0d1b3d;
            color: white;
        }

        .btn-custom:hover {
            background: #1b2c59;
            color: white;
        }
    </style>
</head>

<body>

<div class="container-form">

    <div class="card p-5">

        <h2 class="mb-4">
            <i class="bi bi-cash-coin"></i>
            Payment Form
        </h2>

        <form th:action="@{/payments/save}"
              th:object="${payment}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Payment Date</label>
                <input type="date"
                       class="form-control"
                       th:field="*{paymentDate}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{amount}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Payment Method</label>
                <input type="text"
                       class="form-control"
                       th:field="*{paymentMethod}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Installments</label>
                <input type="number"
                       class="form-control"
                       th:field="*{installments}">
            </div>

            <div class="mb-3">
    <label class="form-label">Policy</label>

    <select class="form-select"
            name="policy"
            required>

        <option value="">Select Policy</option>

        <option th:each="p : ${policies}"
                th:value="${p.id}"
                th:text="${p.policyNumber}">
        </option>

    </select>
</div>
            
 <!-- Buttons -->
            <div class="mt-4">

                <!-- Button to save the payment -->
                <button type="submit" class="btn btn-custom">
                    <i class="bi bi-save"></i>
                    Save Payment
                </button>
                
                <a th:href="@{/dashboard}" class="btn btn-secondary">
                    <i class="bi bi-house-door"></i>
                    Dashboard
                </a>

                <!-- Button to return to the payments list -->
                <a th:href="@{/payments}" class="btn btn-secondary">
                    Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
