<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Insurances</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#0d1b3d;
            color:white;
            padding-top:20px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1b2c59;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .btn-custom{
            background:#0d1b3d;
            color:white;
        }

        .btn-custom:hover{
            background:#1b2c59;
            color:white;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h3>
        <i class="bi bi-shield-check"></i>
        Seguros App
    </h3>

    <a th:href="@{/clients}">
        <i class="bi bi-people"></i>
        Clients
    </a>

    <a th:href="@{/insurances}">
        <i class="bi bi-shield"></i>
        Insurances
    </a>

    <a th:href="@{/policies}">
        <i class="bi bi-file-earmark-text"></i>
        Policies
    </a>

    <a th:href="@{/payments}">
        <i class="bi bi-cash"></i>
        Payments
    </a>

    <a th:href="@{/logout}">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            <i class="bi bi-shield-fill-check"></i>
            Insurances List
        </h2>
        
        <div>

            <!-- Dashboard -->
            <a th:href="@{/dashboard}"
               class="btn btn-outline-secondary me-2">

                <i class="bi bi-house-door"></i>
                Dashboard

            </a>

            <!-- Crear seguro -->
            <a sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_EMPLOYEE')"
               th:href="@{/insurances/new}"
               class="btn btn-custom">

                <i class="bi bi-plus-circle"></i>
                New Insurance

            </a>

        </div>

    </div>
    
    <form th:action="@{/insurances}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search insurance by type..."
                   th:value="${search}">
            <button class="btn btn-outline-secondary" type="submit">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </form>

    <div class="card card-custom p-4">

        <table class="table table-hover">

            <thead class="table-dark">

                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Cost</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                <tr th:each="i : ${insurances}">

                    <td th:text="${i.name}"></td>

                    <td th:text="${i.type}"></td>

                    <td th:text="${i.cost}"></td>

                    <td>

                        <!-- Editar -->
                        <a sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_EMPLOYEE')"
                           th:href="@{/insurances/edit/{id}(id=${i.id})}"
                           class="btn btn-warning btn-sm">

                            <i class="bi bi-pencil"></i>

                        </a>

                        <!-- Eliminar SOLO ADMIN -->
                        <a sec:authorize="hasAuthority('ROLE_ADMIN')"
                           th:href="@{/insurances/delete/{id}(id=${i.id})}"
                           class="btn btn-danger btn-sm">

                            <i class="bi bi-trash"></i>

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
