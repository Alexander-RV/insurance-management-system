<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Insurance Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .container-form{
            max-width:700px;
            margin:auto;
            margin-top:50px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .btn-custom{
            background:#0d1b3d;
            color:white;
        }

        .btn-custom:hover{
            background:#1b2c59;
            color:white;
        }

    </style>

</head>

<body>

<div class="container-form">

    <div class="card p-5">

        <h2 class="mb-4">
            <i class="bi bi-shield-plus"></i>
            Insurance Form
        </h2>

        <form th:action="@{/insurances/save}" th:object="${insurance}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">

                <label class="form-label">Name</label>

                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">Type</label>

                <input type="text"
                       class="form-control"
                       th:field="*{type}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">Cost</label>

                <input type="number"
                       class="form-control"
                       th:field="*{cost}"
                       required>

            </div>

            <button type="submit" class="btn btn-custom">
                <i class="bi bi-save"></i>
                Save Insurance
            </button>
            
            <a th:href="@{/dashboard}" class="btn btn-secondary">
                <i class="bi bi-house-door"></i>
                Dashboard
            </a>

            <a th:href="@{/insurances}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
