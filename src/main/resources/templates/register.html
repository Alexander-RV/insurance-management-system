<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register - Seguros App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body {

            background: #f4f6f9;
        }

        .register-container {

            max-width: 550px;

            margin: auto;

            margin-top: 50px;

            margin-bottom: 50px;
        }

        .card {

            border: none;

            border-radius: 20px;

            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .btn-custom {

            background: #0d1b3d;

            color: white;

            border-radius: 10px;

            padding: 10px;
        }

        .btn-custom:hover {

            background: #1b2c59;

            color: white;
        }

        .form-control,
        .form-select {

            border-radius: 10px;

            padding: 10px;
        }

        .register-title {

            font-weight: 700;

            color: #0d1b3d;
        }

        .section-title {

            color: #0d1b3d;

            font-size: 15px;

            font-weight: 600;

            margin-bottom: 15px;

            margin-top: 10px;
        }

    </style>

</head>

<body>

<div class="register-container">

    <div class="card p-5">

        <!-- Título -->
        <h2 class="text-center mb-4 register-title">

            <i class="bi bi-person-plus-fill"></i>

            Register User

        </h2>

        <!-- Error -->
        <div th:if="${error}"
             class="alert alert-danger"
             th:text="${error}">
        </div>

        <!-- Formulario -->
        <form th:action="@{/register}"
              th:object="${user}"
              method="post">

            <!-- DATOS DE ACCESO -->
            <div class="section-title">

                <i class="bi bi-shield-lock"></i>
                Login Information

            </div>

            <!-- Username -->
            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{username}"
                       required>

            </div>

            <!-- Password -->
            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       class="form-control"
                       th:field="*{password}"
                       required>

            </div>

            <!-- Role -->
            <div class="mb-4">

                <label class="form-label">
                    Select Role
                </label>

                <select class="form-select"
                        th:field="*{role}"
                        required>

                    <option value="">
                        Choose a role
                    </option>

                    <option value="ROLE_EMPLOYEE">
                        Employee
                    </option>

                    <option value="ROLE_CLIENT">
                        Client
                    </option>

                </select>

            </div>

            <!-- DATOS PERSONALES -->
            <div class="section-title">

                <i class="bi bi-person-vcard"></i>
                Personal Information

            </div>

            <!-- Name -->
            <div class="mb-3">

                <label class="form-label">
                    Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       required>

            </div>

            <!-- Last Name -->
            <div class="mb-3">

                <label class="form-label">
                    Last Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{lastName}"
                       required>

            </div>

            <!-- Document -->
            <div class="mb-3">

                <label class="form-label">
                    Document
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{document}"
                       required>

            </div>

            <!-- Email -->
            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                       class="form-control"
                       th:field="*{email}"
                       required>

            </div>

            <!-- Phone -->
            <div class="mb-3">

                <label class="form-label">
                    Phone
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{phone}"
                       required>

            </div>

            <!-- Address -->
            <div class="mb-4">

                <label class="form-label">
                    Address
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{address}"
                       required>

            </div>

            <!-- Registrar -->
            <button type="submit"
                    class="btn btn-custom w-100">

                <i class="bi bi-person-check-fill"></i>

                Register

            </button>

            <!-- Volver -->
            <a th:href="@{/login}"
               class="btn btn-outline-secondary w-100 mt-2">

                <i class="bi bi-box-arrow-in-right"></i>

                Back to Login

            </a>

        </form>

    </div>

</div>

</body>
</html>
