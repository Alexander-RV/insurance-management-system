<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Insurance System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#0d1b3d;
            color:white;
            padding-top:20px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1b2c59;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .table{
            background:white;
            border-radius:10px;
            overflow:hidden;
        }

        .btn-custom{
            background:#0d1b3d;
            color:white;
        }

        .btn-custom:hover{
            background:#1b2c59;
            color:white;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>
        <i class="bi bi-shield-check"></i>
        Seguros App
    </h3>

    <a th:href="@{/clients}">
        <i class="bi bi-people"></i>
        Clients
    </a>

    <a th:href="@{/insurances}">
        <i class="bi bi-shield"></i>
        Insurances
    </a>

    <a th:href="@{/policies}">
        <i class="bi bi-file-earmark-text"></i>
        Policies
    </a>

    <a th:href="@{/payments}">
        <i class="bi bi-cash"></i>
        Payments
    </a>

    <a th:href="@{/logout}">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<!-- CONTENT -->
<div class="content">

    <div th:replace="${content}"></div>

</div>

</body>
</html>
